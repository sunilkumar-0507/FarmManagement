<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – Farm Management System</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-bg">
    <div class="auth-pattern"></div>
    <div class="auth-blob" style="width:280px;height:280px;top:-60px;right:-60px;animation-delay:0s"></div>
    <div class="auth-blob" style="width:180px;height:180px;bottom:-40px;left:-40px;animation-delay:2s"></div>

    <div class="auth-card" style="max-width:480px">
      <!-- Header -->
      <div class="auth-header">
        <span class="brand-emoji">👤</span>
        <h1>Create Account</h1>
        <p>Join the Farm Management System</p>
      </div>

      <!-- Body -->
      <div class="auth-body">
        <form id="register-form" novalidate>
          <!-- Full Name -->
          <div class="form-group">
            <label class="form-label" for="reg-name">Full Name</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon">🧑</span>
              <input type="text" id="reg-name" class="form-control" placeholder="John Smith" autocomplete="name" />
            </div>
            <span class="error-msg" id="name-error"></span>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label class="form-label" for="reg-email">Email Address</label>
            <div class="auth-input-wrap">
              <span class="auth-input-icon">✉️</span>
              <input type="email" id="reg-email" class="form-control" placeholder="you@farm.com" autocomplete="email" />
            </div>
            <span class="error-msg" id="email-error"></span>
          </div>

          <!-- Passwords Row -->
          <div class="form-row">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label" for="reg-password">Password</label>
              <div class="auth-input-wrap" style="display:flex;align-items:center">
                <span class="auth-input-icon">🔒</span>
                <input type="password" id="reg-password" class="form-control"
                  placeholder="Min. 6 chars" style="padding-right:40px" />
                <button type="button" id="toggle-password"
                  style="position:absolute;right:10px;background:none;border:none;font-size:14px;cursor:pointer;color:#718096">
                  👁
                </button>
              </div>
              <span class="error-msg" id="pass-error"></span>
            </div>

            <div class="form-group" style="margin-bottom:0">
              <label class="form-label" for="reg-confirm">Confirm Password</label>
              <div class="auth-input-wrap" style="display:flex;align-items:center">
                <span class="auth-input-icon">🔒</span>
                <input type="password" id="reg-confirm" class="form-control"
                  placeholder="Repeat password" style="padding-right:40px" />
                <button type="button" id="toggle-confirm"
                  style="position:absolute;right:10px;background:none;border:none;font-size:14px;cursor:pointer;color:#718096">
                  👁
                </button>
              </div>
              <span class="error-msg" id="confirm-error"></span>
            </div>
          </div>

          <!-- Role Selection -->
          <div class="form-group" style="margin-top:20px">
            <label class="form-label">Select Your Role</label>
            <div class="role-grid">
              <div class="role-card">
                <input type="radio" name="role" id="role-worker" value="FarmWorker" checked />
                <label for="role-worker">
                  <span class="role-emoji">🌱</span>
                  Farm Worker
                </label>
              </div>
              <div class="role-card">
                <input type="radio" name="role" id="role-owner" value="FarmOwner" />
                <label for="role-owner">
                  <span class="role-emoji">🏡</span>
                  Farm Owner
                </label>
              </div>
              <div class="role-card">
                <input type="radio" name="role" id="role-admin" value="Admin" />
                <label for="role-admin">
                  <span class="role-emoji">⚙️</span>
                  Admin
                </label>
              </div>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-auth" style="margin-top:8px">
            <span id="btn-spinner" class="hidden" style="margin-right:6px">⏳</span>
            <span id="btn-text">✓ Create Account</span>
          </button>
        </form>

        <div class="auth-footer">
          Already have an account? <a href="index.html">Sign in here</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
