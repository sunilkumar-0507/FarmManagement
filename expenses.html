<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expenses – Farm Management System</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    @keyframes slideInRight { from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)} }

    /* ─── Modal ─── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from{opacity:0}to{opacity:1} }

    .modal-box {
      background: white;
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 520px;
      box-shadow: var(--shadow-xl);
      overflow: hidden;
      animation: modalSlideUp .25s ease both;
    }
    @keyframes modalSlideUp {
      from{opacity:0;transform:translateY(30px) scale(.97)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }

    .modal-header {
      background: linear-gradient(135deg, var(--red-600), var(--red-500));
      padding: 20px 28px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header-left { display: flex; align-items: center; gap: 10px; }
    .modal-header h3 { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 17px; }
    .modal-close-btn {
      background: rgba(255,255,255,.15);
      border: none;
      color: white;
      width: 30px; height: 30px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }
    .modal-close-btn:hover { background: rgba(255,255,255,.3); }

    .modal-body { padding: 28px; }
    .modal-footer { padding: 0 28px 24px; display: flex; gap: 10px; }
    .modal-footer .btn { flex: 1; justify-content: center; padding: 12px; }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="page-container">
    <!-- Page Header -->
    <div class="page-header">
      <div class="page-title-group">
        <h2 class="page-title">💸 Expense Management</h2>
        <p class="page-subtitle">Track and manage all farm expenses</p>
      </div>
      <button class="btn btn-danger" id="btn-add-expense">
        <span>+</span> Add Expense
      </button>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-group">
        <label class="filter-label">Category</label>
        <select id="filter-category" class="filter-select">
          <option value="">All Categories</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">From Date</label>
        <input type="date" id="filter-from" class="filter-input" />
      </div>
      <div class="filter-group">
        <label class="filter-label">To Date</label>
        <input type="date" id="filter-to" class="filter-input" />
      </div>
      <div style="display:flex;gap:8px;align-items:flex-end">
        <button class="btn btn-primary btn-sm" id="btn-filter">⚙ Filter</button>
        <button class="btn btn-outline btn-sm" id="btn-clear-filter">✕ Clear</button>
      </div>
    </div>

    <!-- Total Banner -->
    <div class="total-banner expense-banner">
      <span>🧮 Total Expenses: <strong id="record-count">0 records</strong></span>
      <span class="total-value" id="total-amount">$0.00</span>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Description</th>
            <th>Amount</th>
            <th id="th-recorded-by">Recorded By</th>
            <th style="text-align:right">Actions</th>
          </tr>
        </thead>
        <tbody id="expense-table-body">
          <tr>
            <td colspan="6" style="text-align:center;padding:40px;color:#718096">Loading…</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="expense-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-header-left">
          <span id="modal-icon" style="font-size:22px">💸</span>
          <h3 id="modal-title">Add New Expense</h3>
        </div>
        <button class="modal-close-btn" id="btn-close-modal">✕</button>
      </div>

      <form id="expense-form" novalidate>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="form-category">Category *</label>
            <select id="form-category" class="form-control">
              <option value="">— Select Category —</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="form-description">Description *</label>
            <input
              type="text"
              id="form-description"
              class="form-control"
              placeholder="e.g. Purchased 50kg urea fertilizer"
              maxlength="200"
            />
          </div>

          <div class="form-row">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label" for="form-amount">Amount ($) *</label>
              <div class="input-group">
                <span class="input-prefix">$</span>
                <input
                  type="number"
                  id="form-amount"
                  class="form-control"
                  placeholder="0.00"
                  min="0.01"
                  step="0.01"
                />
              </div>
            </div>

            <div class="form-group" style="margin-bottom:0">
              <label class="form-label" for="form-date">Date *</label>
              <input
                type="date"
                id="form-date"
                class="form-control"
              />
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="submit" class="btn btn-danger">💾 Save Expense</button>
          <button type="button" class="btn btn-outline" id="btn-cancel">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/expenses.js"></script>
</body>
</html>
